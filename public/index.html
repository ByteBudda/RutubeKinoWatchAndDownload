<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kino Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff004c;
            --primary-glow: rgba(255, 0, 76, 0.4);
            --bg-dark: #050505;
            --bg-darker: #0a0a0a;
            --glass: rgba(15, 15, 17, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --success: #00ff88;
            --error: #ff4444;
            --radius: 16px;
            --radius-sm: 8px;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px var(--primary-glow);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text);
        }

        .logo-accent {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
        }

        .search-form {
            flex: 1;
            max-width: 600px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 12px 20px 12px 45px;
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            background: rgba(0, 0, 0, 0.6);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: var(--shadow), var(--shadow-glow);
        }

        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            filter: brightness(0.85);
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Player Overlay */
        .player-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .player-container {
            width: 100%;
            max-width: 1200px;
        }

        .player-wrapper {
            position: relative;
            padding-top: 56.25%;
            border-radius: var(--radius);
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 20px;
        }

        .player-close {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .player-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border-color: var(--primary);
        }

        .download-btn {
            background: linear-gradient(135deg, var(--primary), #c40038);
            border: none;
            padding: 12px 30px;
            border-radius: var(--radius);
            color: var(--text);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: var(--shadow-glow);
            transition: all 0.3s;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--primary);
        }

        /* Downloads Container */
        .downloads-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 3000;
            max-height: 70vh;
            overflow-y: auto;
        }

        .downloads-container::-webkit-scrollbar {
            width: 6px;
        }

        .downloads-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }

        .downloads-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .dl-panel {
            background: rgba(20, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .dl-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .dl-percent {
            font-family: 'Syncopate', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        .dl-actions {
            display: flex;
            gap: 8px;
        }

        .dl-btn {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            font-size: 14px;
        }

        .dl-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text);
        }

        .dl-btn.pause:hover {
            background: #ffcc00;
            color: #000;
        }

        .dl-btn.cancel:hover {
            background: var(--error);
            color: #fff;
        }

        .dl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .dl-file {
            font-size: 12px;
            color: var(--text-muted);
            margin: 8px 0 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .dl-size {
            font-size: 10px;
            color: var(--text-muted);
            margin: 0 0 8px;
            opacity: 0.8;
        }

        .progress-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin: 12px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #ff4d7d);
            border-radius: 3px;
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.3s ease;
            width: 0%;
        }

        .dl-footer {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--primary);
            padding: 15px 25px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            z-index: 3001;
            display: none;
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .notification.show {
            display: block;
        }

        /* Loading */
        .loading {
            font-family: 'Syncopate', sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }
            .search-form {
                max-width: 100%;
            }
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 15px;
            }
            .downloads-container {
                bottom: 20px;
                right: 20px;
                left: 20px;
                width: auto;
                max-width: calc(100vw - 40px);
            }
            .dl-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">KINO<span class="logo-accent">·DOWNLOADER</span></div>
                <form class="search-form" id="searchForm">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск фильмов..." autocomplete="off">
                </form>
            </div>
        </header>

        <main>
            <div class="video-grid" id="videoGrid">
                <div class="loading">ЗАГРУЗКА КАТАЛОГА...</div>
            </div>
        </main>
    </div>

    <!-- Player Overlay -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-container">
            <div class="player-wrapper">
                <iframe id="playerFrame" src="" allowfullscreen></iframe>
            </div>
            <div class="player-controls">
                <button class="player-close" onclick="closePlayer()">✕ ЗАКРЫТЬ</button>
                <button class="download-btn" id="downloadBtn">СКАЧАТЬ В 4K</button>
            </div>
        </div>
    </div>

    <!-- Downloads Container -->
    <div class="downloads-container" id="downloadsContainer"></div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        const API_BASE = `http://${location.hostname}:9764`;
        let ws = null;
        let currentVideoUrl = '';
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;
        let isSearchMode = false;
        const activeDownloads = {};

        // ===== Utility Functions =====
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/'/g, "\\'");
        }

        function safeQuery(selector, parent = document) {
            try {
                return parent.querySelector(selector) || null;
            } catch {
                return null;
            }
        }

        // ===== Notification System =====
        function showNotification(message, isError = false) {
            const el = document.getElementById('notification');
            if (!el) return;

            el.textContent = message;
            el.className = 'notification' + (isError ? ' error' : '');
            el.classList.add('show');

            setTimeout(() => {
                el.classList.remove('show');
            }, 4000);
        }

        // ===== Download Panel Manager =====
        class DownloadPanel {
            constructor(url) {
                this.url = url;
                this.element = null;
                this.create();
            }

            create() {
                const container = document.getElementById('downloadsContainer');
                if (!container) return null;

                const panel = document.createElement('div');
                panel.className = 'dl-panel';
                const safeUrl = escapeHtml(this.url);

                panel.innerHTML = `
                    <div class="dl-header">
                        <span class="dl-percent">0%</span>
                        <div class="dl-actions">
                            <button class="dl-btn pause" onclick="toggleDownloadPause('${safeUrl}')">⏸</button>
                            <button class="dl-btn cancel" onclick="cancelDownload('${safeUrl}')">✕</button>
                        </div>
                    </div>
                    <div class="dl-file">Подготовка...</div>
                    <div class="dl-size">--</div>
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                    <div class="dl-footer">
                        <span class="dl-speed">0 KB/s</span>
                        <span class="dl-eta">--:--</span>
                    </div>
                `;

                container.appendChild(panel);
                this.element = panel;
                this.percentEl = safeQuery('.dl-percent', panel);
                this.fileEl = safeQuery('.dl-file', panel);
                this.sizeEl = safeQuery('.dl-size', panel);
                this.speedEl = safeQuery('.dl-speed', panel);
                this.etaEl = safeQuery('.dl-eta', panel);
                this.progressBar = safeQuery('.progress-bar', panel);
                this.pauseBtn = safeQuery('.dl-btn.pause', panel);

                if (this.pauseBtn) {
                    this.pauseBtn.disabled = false;
                }

                return panel;
            }

            update(data) {
                if (!this.element) return;

                if (data.percent !== undefined && this.percentEl) {
                    this.percentEl.textContent = Math.round(data.percent) + '%';
                }
                if (data.percent !== undefined && this.progressBar) {
                    this.progressBar.style.width = data.percent + '%';
                }
                if (data.filename && this.fileEl) {
                    this.fileEl.textContent = data.filename;
                }
                if (data.size && this.sizeEl) {
                    this.sizeEl.textContent = data.size;
                }
                if (data.speed && this.speedEl) {
                    this.speedEl.textContent = data.speed + '/s';
                }
                if (data.eta && this.etaEl) {
                    this.etaEl.textContent = data.eta;
                }
            }

            markComplete() {
                if (this.percentEl) this.percentEl.textContent = '✓';
                if (this.progressBar) this.progressBar.style.background = '#00ff88';
                if (this.pauseBtn) this.pauseBtn.disabled = true;
            }

            remove() {
                if (this.element && this.element.parentNode) {
                    this.element.parentNode.removeChild(this.element);
                }
                delete activeDownloads[this.url];
            }
        }

        // ===== API Functions =====
        async function fetchAPI(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                showNotification('Ошибка соединения с сервером', true);
                return [];
            }
        }

        async function loadCatalog(reset = true) {
            if (reset) {
                currentPage = 1;
                hasMore = true;
                const grid = document.getElementById('videoGrid');
                if (grid) {
                    grid.innerHTML = '<div class="loading">ЗАГРУЗКА...</div>';
                }
            }

            if (isLoading || !hasMore) return;
            isLoading = true;

            try {
                const videos = await fetchAPI(`/api/catalog?page=${currentPage}&size=24`);

                if (videos.length === 0) {
                    hasMore = false;
                    const loadingEl = document.querySelector('.loading');
                    if (reset && loadingEl) {
                        loadingEl.textContent = 'КОНТЕНТ ЗАКОНЧИЛСЯ';
                    }
                } else {
                    renderVideos(videos, !reset); // append if not reset
                    currentPage++;
                }
            } catch (error) {
                console.error('Catalog load error:', error);
            } finally {
                isLoading = false;
            }
        }

        async function searchVideos(query) {
            if (!query.trim()) return;
            isSearchMode = true;
            currentPage = 1;
            hasMore = true;

            const grid = document.getElementById('videoGrid');
            if (grid) {
                grid.innerHTML = '<div class="loading">ПОИСК...</div>';
            }

            try {
                const videos = await fetchAPI(`/api/search?q=${encodeURIComponent(query)}`);
                renderVideos(videos, false); // replace for search
                currentPage = 2;
            } catch (error) {
                console.error('Search error:', error);
            }
        }

        function renderVideos(videos, append = true) {
            const grid = document.getElementById('videoGrid');
            if (!grid) return;

            if (!videos.length) {
                if (append) {
                    // Don't show "nothing found" when appending
                    return;
                } else {
                    grid.innerHTML = '<div class="loading">НИЧЕГО НЕ НАЙДЕНО</div>';
                }
                return;
            }

            const html = videos.map(v => `
                <div class="video-card" onclick="openPlayer('${v.embed || ''}', '${v.url || ''}')">
                    <img class="video-thumbnail" src="${v.thumb || ''}" loading="lazy" 
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22%3E%3Crect fill=%22%23333%22 width=%22320%22 height=%22180%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23888%22%3ENO IMAGE%3C/svg%3E'">
                    <div class="video-info">
                        <div class="video-title">${v.title || 'Untitled'}</div>
                    </div>
                </div>
            `).join('');

            if (append) {
                grid.insertAdjacentHTML('beforeend', html);
            } else {
                grid.innerHTML = html;
            }
        }

        // ===== Player Functions =====
        function openPlayer(embedUrl, videoUrl) {
            currentVideoUrl = videoUrl;
            const frame = document.getElementById('playerFrame');
            const overlay = document.getElementById('playerOverlay');

            if (frame) frame.src = embedUrl || '';
            if (overlay) overlay.style.display = 'flex';
        }

        function closePlayer() {
            const frame = document.getElementById('playerFrame');
            const overlay = document.getElementById('playerOverlay');

            if (frame) frame.src = '';
            if (overlay) overlay.style.display = 'none';
            currentVideoUrl = '';
        }

        // ===== Download Functions =====
        function startDownload(url) {
            if (!ws || !url) {
                showNotification('Ошибка: WebSocket не подключен', true);
                return;
            }

            if (activeDownloads[url]) {
                showNotification('Этот файл уже скачивается', true);
                return;
            }

            try {
                ws.send(JSON.stringify({ action: 'start', url }));
            } catch (error) {
                showNotification('Ошибка запуска скачивания', true);
            }
        }

        function cancelDownload(url) {
            if (!ws || !url) return;
            activeDownloads[url]?.remove();
            try {
                ws.send(JSON.stringify({ action: 'cancel', url }));
            } catch (error) {}
        }

        function toggleDownloadPause(url) {
            if (!ws || !url) return;
            const panel = activeDownloads[url];
            if (!panel || !panel.pauseBtn) return;

            const isPaused = panel.pauseBtn.innerHTML === '▶';
            try {
                ws.send(JSON.stringify({ 
                    action: isPaused ? 'resume' : 'pause', 
                    url 
                }));
            } catch (error) {}
        }

        // ===== WebSocket Connection =====
        function connectWebSocket() {
            try {
                ws = new WebSocket(`ws://${location.hostname}:9764`);

                ws.onopen = () => {
                    console.log('WebSocket connected');
                };

                ws.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        if (!data || !data.type) return;

                        handleDownloadMessage(data);
                    } catch (error) {
                        console.error('Message parse error:', error);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };

                ws.onclose = () => {
                    console.log('WebSocket closed, reconnecting...');
                    setTimeout(connectWebSocket, 5000);
                };
            } catch (error) {
                console.error('WebSocket init error:', error);
                setTimeout(connectWebSocket, 5000);
            }
        }

        function handleDownloadMessage(data) {
            if (!data.url) return;

            switch (data.type) {
                case 'progress':
                    if (!activeDownloads[data.url]) {
                        activeDownloads[data.url] = new DownloadPanel(data.url);
                    }
                    activeDownloads[data.url]?.update(data);
                    break;

                case 'paused':
                    const panel = activeDownloads[data.url];
                    if (panel && panel.pauseBtn) {
                        panel.pauseBtn.innerHTML = data.paused ? '▶' : '⏸';
                    }
                    break;

                case 'finished':
                    const finishedPanel = activeDownloads[data.url];
                    if (finishedPanel) {
                        finishedPanel.markComplete();
                        showNotification('✅ Скачивание завершено!');
                        setTimeout(() => finishedPanel.remove(), 4000);
                    }
                    break;

                case 'error':
                    if (data.message !== 'cancelled') {
                        showNotification(`❌ ${data.message || 'Ошибка'}`, true);
                    }
                    activeDownloads[data.url]?.remove();
                    break;
            }
        }

        // ===== Event Listeners =====
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
            loadCatalog(true);

            // Search form
            const searchForm = document.getElementById('searchForm');
            searchForm?.addEventListener('submit', (e) => {
                e.preventDefault();
                const query = document.getElementById('searchInput')?.value?.trim();
                if (query) searchVideos(query);
            });

            // Logo click - reset to catalog
            const logo = document.querySelector('.logo');
            logo?.addEventListener('click', () => {
                document.getElementById('searchInput').value = '';
                isSearchMode = false;
                loadCatalog(true);
            });

            // Download button
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn?.addEventListener('click', () => {
                startDownload(currentVideoUrl);
                closePlayer();
            });

            // Infinite scroll with debounce
            let isScrolling = false;
            window.addEventListener('scroll', () => {
                if (isSearchMode || isLoading || isScrolling) return;
                
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                    isScrolling = true;
                    loadCatalog(false).finally(() => {
                        setTimeout(() => { isScrolling = false; }, 500);
                    });
                }
            });
        });
    </script>
</body>
</html>
